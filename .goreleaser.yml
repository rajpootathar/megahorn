version: 2
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rajpootathar/megahorn/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "megahorn_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: rajpootathar
    name: megahorn
